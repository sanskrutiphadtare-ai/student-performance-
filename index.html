<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Student Performance Predictor</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(
135deg,
#0f172a,
#1e1b4b,
#312e81
);
overflow-x:hidden;
}

/* Background Effects */

.blob{
position:fixed;
border-radius:50%;
filter:blur(120px);
z-index:-1;
}

.blob1{
width:350px;
height:350px;
background:#6366f1;
top:-100px;
left:-100px;
}

.blob2{
width:300px;
height:300px;
background:#06b6d4;
right:-100px;
top:30%;
}

.blob3{
width:350px;
height:350px;
background:#8b5cf6;
bottom:-100px;
left:40%;
}

/* Main Card */

.glass-card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.15);
border-radius:30px;
padding:40px;
box-shadow:0 20px 50px rgba(0,0,0,.3);
}

/* Heading */

.hero-title{
color:white;
font-size:3rem;
font-weight:700;
}

.hero-subtitle{
color:#cbd5e1;
font-size:1.1rem;
}

/* Form */

label{
color:white;
font-weight:500;
margin-bottom:8px;
}

.form-control,
.form-select{
height:55px;
border-radius:15px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
color:white;
}

.form-control:focus,
.form-select:focus{
background:rgba(255,255,255,0.12);
border-color:#6366f1;
box-shadow:0 0 15px rgba(99,102,241,.4);
color:white;
}

.form-select option{
color:black;
}

/* Button */

.predict-btn{
background:linear-gradient(
135deg,
#6366f1,
#8b5cf6,
#06b6d4
);

border:none;
border-radius:15px;
padding:15px;
font-size:18px;
font-weight:600;
color:white;
transition:0.3s;
}

.predict-btn:hover{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(99,102,241,.5);
}

/* Icons */

.input-icon{
color:#06b6d4;
margin-right:8px;
}

</style>

</head>

<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="container py-5">

<div class="text-center mb-5">

<h1 class="hero-title">
<i class="fas fa-brain"></i>
AI Student Performance Predictor
</h1>

<p class="hero-subtitle">
Predict Student Results & Generate Smart Study Recommendations
</p>

</div>

<div class="glass-card">

<form action="/predict" method="POST">

<div class="row">

<div class="col-md-6 mb-4">
<label>
<i class="fas fa-book-open input-icon"></i>
Hours Studied
</label>
<input type="number" class="form-control" name="Hours_Studied" required>
</div>

<div class="col-md-6 mb-4">
<label>
<i class="fas fa-calendar-check input-icon"></i>
Attendance %
</label>
<input type="number" class="form-control" name="Attendance" required>
</div>

<div class="col-md-6 mb-4">
<label>
<i class="fas fa-chart-line input-icon"></i>
Previous Scores
</label>
<input type="number" class="form-control" name="Previous_Scores" required>
</div>

<div class="col-md-6 mb-4">
<label>
<i class="fas fa-user-graduate input-icon"></i>
Tutoring Sessions
</label>
<input type="number" class="form-control" name="Tutoring_Sessions" required>
</div>

<div class="col-md-6 mb-4">
<label>
<i class="fas fa-bed input-icon"></i>
Sleep Hours
</label>
<input type="number" class="form-control" name="Sleep_Hours" required>
</div>

<div class="col-md-6 mb-4">
<label>
<i class="fas fa-running input-icon"></i>
Physical Activity
</label>
<input type="number" class="form-control" name="Physical_Activity" required>
</div>

<div class="col-md-6 mb-4">
<label>
<i class="fas fa-wifi input-icon"></i>
Internet Access
</label>

<select class="form-select" name="Internet_Access">
<option value="Yes">Yes</option>
<option value="No">No</option>
</select>
</div>

<div class="col-md-6 mb-4">
<label>
<i class="fas fa-laptop-house input-icon"></i>
Access to Resources
</label>

<select class="form-select" name="Access_to_Resources">
<option value="High">High</option>
<option value="Medium">Medium</option>
<option value="Low">Low</option>
</select>
</div>

<div class="col-md-6 mb-4">
<label>
<i class="fas fa-users input-icon"></i>
Parental Involvement
</label>

<select class="form-select" name="Parental_Involvement">
<option value="High">High</option>
<option value="Medium">Medium</option>
<option value="Low">Low</option>
</select>
</div>

<div class="col-md-6 mb-4">
<label>
<i class="fas fa-user-friends input-icon"></i>
Peer Influence
</label>

<select class="form-select" name="Peer_Influence">
<option value="Positive">Positive</option>
<option value="Neutral">Neutral</option>
<option value="Negative">Negative</option>
</select>
</div>

<div class="col-md-6 mb-4">
<label>
<i class="fas fa-money-bill-wave input-icon"></i>
Family Income
</label>

<select class="form-select" name="Family_Income">
<option value="High">High</option>
<option value="Medium">Medium</option>
<option value="Low">Low</option>
</select>
</div>

<div class="col-md-6 mb-4">
<label>
<i class="fas fa-venus-mars input-icon"></i>
Gender
</label>

<select class="form-select" name="Gender">
<option value="Male">Male</option>
<option value="Female">Female</option>
</select>
</div>

</div>

<button type="submit" class="btn predict-btn w-100 mt-3">

<i class="fas fa-chart-bar"></i>
Predict Performance

</button>

</form>

</div>

</div>

</body>
</html>
